name: Daily DB Backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump (v16)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          URL=$(echo "$DATABASE_URL" | sed -E 's/[?&]sslmode=[^&]*//g; s/[?&]sslrootcert=[^&]*//g; s/[?&]sslcert=[^&]*//g; s/[?&]sslkey=[^&]*//g')
          if echo "$URL" | grep -q "?"; then
            URL="$URL&sslmode=require"
          else
            URL="$URL?sslmode=require"
          fi
          OUT="backup_$(date +%Y%m%d_%H%M%S).sql"
          pg_dump "$URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            --file="$OUT"
          SIZE=$(stat -c%s "$OUT")
          echo "dump size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Dump too small ($SIZE bytes) — backup likely failed"
            exit 1
          fi
          gzip "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: "*.sql.gz"
          retention-days: 90
