name: Daily DB Backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump v13 (CockroachDB 호환)
        run: |
          set -euo pipefail
          sudo install -d /usr/share/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-13
          /usr/lib/postgresql/13/bin/pg_dump --version

      - name: Provide CA cert for libpq
        run: |
          mkdir -p ~/.postgresql
          cp /etc/ssl/certs/ca-certificates.crt ~/.postgresql/root.crt

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          OUT="backup_$(date +%Y%m%d_%H%M%S).sql"
          /usr/lib/postgresql/13/bin/pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            --file="$OUT"
          SIZE=$(stat -c%s "$OUT")
          echo "dump size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Dump too small ($SIZE bytes) — backup likely failed"
            exit 1
          fi
          gzip "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: "*.sql.gz"
          retention-days: 90
