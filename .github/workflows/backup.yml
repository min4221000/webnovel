name: Daily DB Backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Export DB as JSON
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          OUT="backup_$(date +%Y%m%d_%H%M%S).json"
          HTTP=$(curl -sS -w "%{http_code}" -o "$OUT" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron/export")
          echo "HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Export failed (HTTP $HTTP)"
            cat "$OUT" || true
            exit 1
          fi
          SIZE=$(stat -c%s "$OUT")
          echo "dump size: $SIZE bytes"
          if [ "$SIZE" -lt 50 ]; then
            echo "::error::Dump too small ($SIZE bytes)"
            exit 1
          fi
          grep -q '"counts"' "$OUT" || { echo "::error::Invalid dump"; exit 1; }
          gzip "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: "*.json.gz"
          retention-days: 90
