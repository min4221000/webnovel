name: Weekly R2 Image Backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  r2-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Sync R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          ACC=$(echo "$R2_ACCOUNT_ID" | tr -d '"'"'"' \t\r\n')
          BKT=$(echo "$R2_BUCKET_NAME" | tr -d '"'"'"' \t\r\n')
          if [ -z "$ACC" ] || [ -z "$BKT" ]; then
            echo "::error::R2 secrets missing"; exit 1
          fi
          # R2 custom endpoint은 path-style 주소 필요
          mkdir -p ~/.aws
          printf '[default]\ns3 =\n  addressing_style = path\n' > ~/.aws/config
          EP="https://${ACC}.r2.cloudflarestorage.com"

          mkdir -p r2dump
          aws s3 sync "s3://${BKT}" ./r2dump --endpoint-url "$EP" --no-progress
          COUNT=$(find r2dump -type f | wc -l)
          echo "synced files: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::notice::버킷 비어있음 — 백업할 이미지 없음 (정상)"
            echo "HAS_FILES=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "HAS_FILES=true" >> "$GITHUB_ENV"
          tar -czf "r2_backup_$(date +%Y%m%d).tar.gz" -C r2dump .

      - name: Upload artifact
        if: env.HAS_FILES == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: r2-backup-${{ github.run_id }}
          path: "*.tar.gz"
          retention-days: 60
