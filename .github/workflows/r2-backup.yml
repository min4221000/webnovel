name: Weekly R2 Image Backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  r2-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Sync R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          ACC=$(echo "$R2_ACCOUNT_ID" | tr -d '"'"'"' \t\r\n')
          BKT=$(echo "$R2_BUCKET_NAME" | tr -d '"'"'"' \t\r\n')
          if [ -z "$ACC" ] || [ -z "$BKT" ]; then
            echo "::error::R2 secrets missing"
            exit 1
          fi
          echo "account id length: ${#ACC} (앞4: ${ACC:0:4})"
          echo "bucket name length: ${#BKT}"
          EP="https://${ACC}.r2.cloudflarestorage.com"
          echo "=== ${BKT} 객체 목록 (에러 그대로 노출) ==="
          echo "=== 토큰이 볼 수 있는 버킷 목록 ==="
          aws s3api list-buckets --endpoint-url "$EP" --query "Buckets[].Name" --output text || echo "list-buckets FAILED"
          echo "=== list-objects-v2 상세 ==="
          aws s3api list-objects-v2 --bucket "$BKT" --endpoint-url "$EP" --max-items 5 2>&1 || true
          aws s3 ls "s3://${BKT}" --endpoint-url "$EP" --recursive
          mkdir -p r2dump
          aws s3 sync "s3://${BKT}" ./r2dump --endpoint-url "$EP" --no-progress
          COUNT=$(find r2dump -type f | wc -l)
          echo "synced files: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::0 files synced — R2_BUCKET_NAME 확인 필요"
            exit 1
          fi
          tar -czf "r2_backup_$(date +%Y%m%d).tar.gz" -C r2dump .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: r2-backup-${{ github.run_id }}
          path: "*.tar.gz"
          retention-days: 60
